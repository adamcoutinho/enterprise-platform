#------------------------------------------------------------------------------
# NETWORK
#------------------------------------------------------------------------------

# Define em quais interfaces de rede o PostgreSQL irá escutar conexões.
# '*' = aceita conexões de qualquer interface de rede.
# localhost = aceita apenas conexões locais.
# Em produção utilize juntamente com pg_hba.conf e firewall.
listen_addresses = '*'


#------------------------------------------------------------------------------
# CONNECTIONS
#------------------------------------------------------------------------------

# Número máximo de conexões simultâneas permitidas.
#
# Cada conexão consome memória e processos do sistema operacional.
# Valores muito altos podem degradar o desempenho.
#
# Para aplicações de alta concorrência recomenda-se utilizar PgBouncer
# e manter este valor relativamente baixo.
max_connections = 300


#------------------------------------------------------------------------------
# MEMORY
#------------------------------------------------------------------------------

# Quantidade de memória dedicada ao cache interno do PostgreSQL.
#
# Quanto maior, menos leituras em disco serão necessárias.
#
# Regra prática:
# - Servidor dedicado: 20~40% da RAM
# - Compartilhado: 10~20%
#
# Exemplo:
# RAM = 8 GB
# shared_buffers = 2GB
shared_buffers = 512MB


# Estimativa da quantidade de memória disponível para cache do sistema
# operacional + PostgreSQL.
#
# Este valor NÃO reserva memória.
# Apenas auxilia o otimizador de consultas (planner).
#
# Geralmente:
# effective_cache_size = 50~75% da RAM
effective_cache_size = 2GB


# Memória utilizada por operações de manutenção como:
#
# - CREATE INDEX
# - VACUUM
# - ANALYZE
# - ALTER TABLE
#
# Quanto maior, mais rápidas essas operações tendem a ser.
maintenance_work_mem = 128MB


# Memória disponível para cada operação de ordenação ou hash.
#
# Utilizada em:
#
# - ORDER BY
# - DISTINCT
# - HASH JOIN
# - CREATE TEMP TABLE
#
# Atenção:
# Este valor é POR OPERAÇÃO e não por conexão.
#
# Exemplo:
# 300 conexões × 3 operações × 8 MB
# ≈ 7,2 GB de RAM
#
# Portanto aumente com cautela.
work_mem = 8MB


#------------------------------------------------------------------------------
# WRITE AHEAD LOG (WAL)
#------------------------------------------------------------------------------

# Define o nível de informações gravadas no WAL.
#
# minimal
# replica
# logical
#
# replica é o padrão e permite:
# - Streaming Replication
# - PITR (Point In Time Recovery)
# - Backups consistentes
wal_level = replica


# Quantidade máxima de arquivos WAL antes de iniciar um checkpoint.
#
# Valor maior:
# + Menos checkpoints
# + Melhor desempenho
# - Mais espaço em disco
max_wal_size = 2GB


# Quantidade mínima de WAL mantida após checkpoint.
#
# Evita recriar arquivos WAL constantemente.
#
# Valores maiores podem reduzir escrita em disco.
min_wal_size = 512MB


#------------------------------------------------------------------------------
# LOGGING
#------------------------------------------------------------------------------

# Habilita um processo dedicado para coletar logs.
#
# Recomendado para praticamente todos os ambientes.
logging_collector = on


# Define para onde os logs serão enviados.
#
# stderr
# csvlog
# jsonlog (PostgreSQL recentes)
#
# Em Docker normalmente utiliza stderr para que o
# Docker capture os logs automaticamente.
log_destination = 'stderr'


# Registra apenas consultas cuja duração seja maior
# que o tempo especificado.
#
# Unidade em milissegundos.
#
# Exemplos:
#
# 0      -> registra todas
# 100    -> acima de 100 ms
# 500    -> acima de 500 ms
# -1     -> desabilita
#
# Excelente para encontrar consultas lentas.
log_min_duration_statement = 500


# Registra toda nova conexão recebida.
#
# Útil para auditoria e troubleshooting.
#
# Em ambientes com milhares de conexões por segundo,
# pode gerar muito volume de logs.
log_connections = on


# Registra quando uma conexão é encerrada.
#
# Muito útil para identificar:
#
# - conexões abandonadas
# - problemas de pool
# - aplicações abrindo conexões demais
log_disconnections = on


#------------------------------------------------------------------------------
# EXTENSIONS
#------------------------------------------------------------------------------

# Bibliotecas carregadas durante a inicialização do PostgreSQL.
#
# Algumas extensões precisam estar aqui para funcionar.
#
# pg_stat_statements:
# - coleta estatísticas de consultas SQL
# - tempo médio
# - quantidade de execuções
# - leituras em disco
# - uso de CPU
#
# Após habilitar também execute:
#
# CREATE EXTENSION pg_stat_statements;
#
# É uma das extensões mais importantes para diagnóstico
# e otimização de desempenho.
shared_preload_libraries = 'pg_stat_statements'
