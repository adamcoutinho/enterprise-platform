version: "3.9"

services:
  postgres:
    image: docker.io/postgres:16
    container_name: postgres
    hostname: postgres

    restart: unless-stopped

    ports:
      - "5432:5432"

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: platform

      TZ: America/Belem
      PGTZ: America/Belem

    volumes:
      # Persistência dos dados
      - postgres_data:/var/lib/postgresql/data

      # Scripts executados somente na primeira inicialização
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro

      # Configuração personalizada (opcional)
      - ./docker/postgresql.conf:/etc/postgresql/postgresql.conf:ro

    command: >
      postgres
      -c config_file=/etc/postgresql/postgresql.conf

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d platform"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

    shm_size: 512m

    networks:
      - platform

volumes:
  postgres_data:

networks:
  platform:
    driver: bridge
